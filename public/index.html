<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osu! a YouTube Sync</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            /* Textura de fondo sutil estilo osu! */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 102, 170, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 221, 255, 0.05) 0%, transparent 20%);
        }

        .container {
            background-color: #2d2d2d;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            max-width: 500px;
            border: 2px solid transparent;
            /* Borde brillante estilo osu! */
            background-image: linear-gradient(#2d2d2d, #2d2d2d), linear-gradient(135deg, #ff66aa 0%, #00ddff 100%);
            background-origin: border-box;
            background-clip: content-box, border-box;
            overflow: hidden;
            position: relative;
        }

        /* Efecto de 'brillo' en el panel */
        .container::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg, rgba(255,102,170,0.1) 0%, rgba(0,221,255,0.05) 100%);
            transform: rotate(30deg);
            pointer-events: none;
        }

        h1 { 
            color: #ff66aa; 
            font-size: 36px;
            font-weight: 800;
            text-transform: lowercase; /* Estilo osu! */
            margin-top: 0;
            text-shadow: 0 0 15px rgba(255, 102, 170, 0.7);
        }

        p {
            color: #aaaaaa;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #ff66aa 0%, #ff4499 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(255, 102, 170, 0.4);
            position: relative;
            z-index: 1;
        }

        button:hover {
            background: linear-gradient(135deg, #ff4499 0%, #ff66aa 100%);
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 102, 170, 0.6);
        }

        button:active {
            transform: scale(0.98) translateY(1px);
        }

        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: scale(1);
            box-shadow: none;
        }

        #estado {
            margin-top: 25px;
            font-size: 16px;
            color: #00ddff; /* Color de estado estilo cian */
            font-weight: 500;
            text-shadow: 0 0 10px rgba(0, 221, 255, 0.5);
        }

        #estado a {
            color: #ffb84d; /* Dorado para el link final */
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
        }

        #estado a:hover { 
            text-decoration: underline; 
            color: #ffcc80;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 osu! a YouTube</h1>
        <p>Genera una playlist de YouTube con tus mapas más jugados de osu! con un solo clic.</p>
        
        <button id="btnGenerar" onclick="generarPlaylist()">Generar Playlist</button>
        
        <div id="estado">Esperando para iniciar sincronización...</div>
    </div>

    <script>
        async function generarPlaylist() {
            const btn = document.getElementById('btnGenerar');
            const estado = document.getElementById('estado');
            
            btn.disabled = true;
            btn.innerText = "⏳ Procesando...";
            estado.innerHTML = "Conectando con los servidores... (Esto tomará unos 15 segundos)";
            estado.style.color = "#ffb84d"; 

            try {
                const respuesta = await fetch('/api/generar');
                const datos = await respuesta.json();

                // Si Google requiere login, redirigimos automáticamente
                if (datos.authRequired) {
                    estado.innerHTML = "🔐 Autenticación requerida. Redirigiendo a Google...";
                    setTimeout(() => { window.location.href = datos.authUrl; }, 1200);
                    return;
                }

                if (datos.exito) {
                    estado.innerHTML = `🎉 ¡Lista Creada! <br><br> <a href="${datos.url}" target="_blank" style="color:#00ddff; text-decoration:underline;">🔗 HAZ CLIC AQUÍ PARA VER TU PLAYLIST</a>`;
                    estado.style.color = "#00ddff";
                    btn.innerText = "¡Listo!";
                } else {
                    estado.innerHTML = "❌ Error: " + (datos.mensaje || "Consulta los logs de la terminal.");
                    estado.style.color = "#ff4d4d";
                    btn.disabled = false;
                    btn.innerText = "Reintentar";
                }
            } catch (error) {
                estado.innerHTML = "❌ Error de comunicación con el Backend local.";
                estado.style.color = "#ff4d4d";
                btn.disabled = false;
                btn.innerText = "Reintentar";
            }
        }
    </script>
</body>
</html>
