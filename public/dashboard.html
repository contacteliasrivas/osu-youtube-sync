<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | osu! Sync</title>
    <style>
        :root {
            --bg-color: #fcedf5; --primary-pink: #ff66aa; --cyan-accent: #00ddff; --text-main: #4a4a4a; --text-muted: #7a7a7a;
            --clay-shadow-out: 12px 12px 24px rgba(255, 102, 170, 0.15), -12px -12px 24px rgba(255, 255, 255, 0.8);
            --clay-shadow-in: inset 6px 6px 12px rgba(255, 255, 255, 0.9), inset -6px -6px 12px rgba(255, 102, 170, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }

        /* Perfil del Usuario */
        .profile-section { text-align: center; margin-bottom: 40px; }
        .avatar-clay { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #fff; box-shadow: var(--clay-shadow-out); margin-bottom: 15px; }
        .profile-section h2 { color: var(--primary-pink); font-size: 2rem; }

        .dashboard-container { background: #ffffff; border-radius: 40px; padding: 40px; width: 100%; max-width: 700px; box-shadow: var(--clay-shadow-out), var(--clay-shadow-in); border: 2px solid rgba(255, 255, 255, 0.5); }
        
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .option-btn { background: #e0e5ec; color: var(--text-main); border: none; padding: 20px; font-size: 16px; font-weight: bold; border-radius: 20px; cursor: pointer; transition: all 0.2s ease; box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.4), -6px -6px 12px rgba(255, 255, 255, 0.8); display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .option-btn:hover { background: #e8ecf1; transform: translateY(-2px); }
        .option-btn .icon { font-size: 24px; }
        .option-btn.active { background: var(--primary-pink); color: white; box-shadow: inset 4px 4px 8px rgba(204, 68, 136, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.4); }

        #progress-container { width: 100%; height: 24px; background: #e0e5ec; border-radius: 12px; margin-top: 25px; overflow: hidden; display: none; box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.8); }
        #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary-pink), var(--cyan-accent)); border-radius: 12px; transition: width 0.4s ease; }
        #estado { margin-top: 15px; font-weight: 600; text-align: center; color: var(--text-muted); }
    </style>
</head>
<body>

    <div class="profile-section">
        <img id="userAvatar" src="" alt="Avatar" class="avatar-clay" style="display:none;">
        <h2 id="userName">Cargando perfil...</h2>
        <p style="color: var(--text-muted);">¿Qué sincronizamos hoy?</p>
    </div>

    <div class="dashboard-container">
        <div class="options-grid">
            <button class="option-btn" onclick="iniciarSincronizacion('mas_jugados')">
                <span class="icon">🔥</span> Más Jugados
            </button>
            <button class="option-btn" onclick="iniciarSincronizacion('favoritos')">
                <span class="icon">⭐</span> Favoritos
            </button>
            <button class="option-btn" onclick="iniciarSincronizacion('recientes')">
                <span class="icon">🕒</span> Recientes
            </button>
        </div>

        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="estado">Selecciona una categoría para empezar.</div>
    </div>

    <script>
        // Cargar los datos del usuario al abrir el dashboard
        async function cargarPerfil() {
            try {
                const response = await fetch('/api/me');
                if (!response.ok) throw new Error('No logueado');
                const user = await response.json();
                
                document.getElementById('userName').innerText = `¡Hola, ${user.username}!`;
                const avatarImg = document.getElementById('userAvatar');
                avatarImg.src = user.avatar;
                avatarImg.style.display = 'inline-block';
            } catch (e) {
                window.location.href = '/landing'; // Protegemos el dashboard
            }
        }

        cargarPerfil();

        // Lógica de estado y sincronización (Idéntica a la anterior, preparada para el futuro)
        const evtSource = new EventSource('/api/estado');
        const estado = document.getElementById('estado');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');

        evtSource.onmessage = function(event) {
            const datos = JSON.parse(event.data);
            estado.innerHTML = datos.mensaje;
            if (datos.color) estado.style.color = datos.color;
            if (datos.progreso !== null) {
                progressContainer.style.display = 'block';
                progressBar.style.width = datos.progreso + '%';
            }
        };

        async function iniciarSincronizacion(tipo) {
            // Nota: Por ahora el endpoint /api/generar solo hace "más jugados",
            // pero ya tenemos la interfaz lista para enviarle el parámetro 'tipo'
            estado.innerHTML = "Iniciando conexión...";
            estado.style.color = "var(--primary-pink)";
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            
            try {
                // En un futuro cambiaremos esto a fetch(`/api/generar?tipo=${tipo}`)
                const respuesta = await fetch('/api/generar'); 
                const datos = await respuesta.json();

                if (datos.authRequired) {
                    estado.innerHTML = "🔐 Conectando con YouTube...";
                    setTimeout(() => { window.location.href = datos.authUrl; }, 1200);
                    return;
                }

                if (datos.exito) {
                    estado.innerHTML = `🎉 ¡Lista Creada! <br><br> <a href="${datos.url}" target="_blank" style="color:var(--cyan-accent);">🔗 VER EN YOUTUBE</a>`;
                    progressBar.style.width = '100%';
                }
            } catch (error) {
                estado.innerHTML = "❌ Error en la sincronización.";
                estado.style.color = "#c0392b";
            }
        }
    </script>
</body>
</html>
